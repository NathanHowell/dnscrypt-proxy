version: 2
updates:
- package-ecosystem: docker
  directory: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 10
  groups:
    docker:
      patterns:
        - "*"
  # Maintain dependencies for GitHub Actions
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "monthly"
  groups:
    github-actions:
      patterns:
        - "*"
